version: "3.9"

services:
  jupyter:
    image: jupyter/scipy-notebook:latest
    container_name: airbnb_jupyter
    ports:
      - "8888:8888"
    volumes:
      - .:/home/jovyan/work
    environment:
      - JUPYTER_ENABLE_LAB=yes
    env_file:
      - .env
    command: start-notebook.sh --NotebookApp.token=''

