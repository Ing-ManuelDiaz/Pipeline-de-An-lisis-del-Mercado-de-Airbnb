version: '3.8'

services:
  jupyter:
    build: . # construye desde tu Dockerfile
    ports:
      - "8888:8888" # expone Jupyter en tu navegador
    volumes:
      - ./notebooks:/app/notebooks # tu trabajo persiste
      - ./data:/app/data # tus datos persisten
      - ./src:/app/src # tu código persiste
    env_file:
      - .env # carga tus variables secretas
    working_dir: /app
